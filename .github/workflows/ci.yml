name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # 1. Install Supabase CLI binary onto the Ubuntu runner environment
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 2. Boot up the local Supabase container infrastructure via Docker
      - name: Start Local Supabase Stack
        run: pnpm db:start

      # 3. Wipes the testing DB and runs all your migrations from scratch to verify structural validity
      - name: Verify Database Migrations
        run: pnpm db:reset
