name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
      # 1. Start the Docker daemon (GitHub Actions runners have Docker pre-installed)
      - name: Start Local Supabase Stack
        run: pnpm db:start # Or npx supabase start

      # 2. Verify that your migrations execute without throwing SQL errors
      - name: Verify Database Migrations
        run: pnpm db:migrate # Or npx supabase migration up
